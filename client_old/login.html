<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login - CryptoXchange</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body onload="displayRole(); updateNavbar(); hideHistoryForNonAdmin();">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="dashboard.html">
            CryptoXchange
        </a>

        <div class="navbar-nav ms-auto align-items-center">

            <div id="roleBox" class="me-3"></div>

            <a class="nav-link" href="dashboard.html">
                Dashboard
            </a>

            <a class="nav-link" href="search.html">
                Search
            </a>

            <a class="nav-link" href="external-api.html">
                Market API
            </a>

            <a class="nav-link" href="crypto-list.html">
                My Portfolio
            </a>

            <a
                class="nav-link"
                id="historyLink"
                href="history.html"
            >
                History
            </a>

            <div
                id="authButtons"
                class="d-flex align-items-center ms-3"
            ></div>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="auth-card">

        <h1 class="page-title">
            Login
        </h1>

        <form
            onsubmit="event.preventDefault(); loginUser();"
        >

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="Enter email"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="Enter password"
                    required
                    minlength="6"
                >

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Login
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="register.html">
                Don't have an account?
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
