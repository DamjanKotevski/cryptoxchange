<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Database Management</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<div class="container mt-5">

    <h1 class="page-title">
        Database Management
    </h1>

    <div class="card p-4 mb-4">

        <h3>Seed Initial Data</h3>

        <p>
            Insert demo users and cryptocurrencies.
        </p>

        <button
            class="btn btn-success"
            onclick="seedDatabase();">

            Seed Database

        </button>

    </div>

    <div class="card p-4">

        <h3>Clear Database</h3>

        <p>
            Delete all data from MongoDB.
        </p>

        <button
            class="btn btn-danger"
            onclick="clearDatabase();">

            Clear Database

        </button>

    </div>

    <div id="dbMessage"
         class="mt-4">
    </div>

</div>

<script>

async function seedDatabase() {

    let response =
        await fetch("/api/db/seed", {
            method: "POST"
        });

    let data = await response.json();

    document.getElementById("dbMessage")
        .innerHTML = `

            <div class="alert alert-success">
                ${data.message}
            </div>

        `;
}

async function clearDatabase() {

    let response =
        await fetch("/api/db/clear", {
            method: "DELETE"
        });

    let data = await response.json();

    document.getElementById("dbMessage")
        .innerHTML = `

            <div class="alert alert-danger">
                ${data.message}
            </div>

        `;
}

</script>

</body>
</html>
