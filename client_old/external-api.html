        <a class="navbar-brand" href="dashboard.html">
            CryptoXchange
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <!-- ROLE -->

                <li class="nav-item me-3">

                    <div id="roleBox"></div>

                </li>

                <!-- NAV LINKS -->

                <li class="nav-item">

                    <a class="nav-link"

    <a class="nav-link" href="history.html">History</a>

    <a class="nav-link"
       href="crypto-list.html">

<div class="container">

    <h1 class="page-title">External Market Data Integration</h1>

    <div class="card p-4 mb-4">
        <h3>CoinGecko API</h3>

        <p>
            This page loads live cryptocurrency market data from an external source.
        </p>

        <p>
            External source:
            <strong>CoinGecko API</strong>
        </p>

        <button class="btn btn-primary" onclick="loadExternalCryptoData();">
            Refresh Market Data
        </button>
    </div>

    <div id="apiStatus" class="alert alert-info">
        Loading data from external API...
    </div>

    <div id="successMessage"></div>

    <div id="externalCryptoContainer" class="row">
        <!-- API data will be displayed here -->
    </div>

</div>

<div class="modal fade" id="portfolioModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content bg-dark text-light">

            <div class="modal-header border-info">

                <h5 class="modal-title">
                    Add To Portfolio
                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="number"
                    id="portfolioQuantity"
                    class="form-control mb-3"
                    placeholder="Quantity Owned"
                >

                <input
                    type="number"
                    id="portfolioBuyPrice"
                    class="form-control"
                    placeholder="Buy Price"
                >

            </div>

            <div class="modal-footer border-info">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    type="button"
                    class="btn btn-primary"
                    onclick="confirmAddToPortfolio();">

                    Add

                </button>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
