<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Add Cryptocurrency</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body onload="displayRole(); updateNavbar(); hideHistoryForNonAdmin();">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="dashboard.html">
            CryptoXchange
        </a>

        <div class="navbar-nav ms-auto align-items-center">

            <div id="roleBox" class="me-3"></div>

            <a class="nav-link" href="dashboard.html">
                Dashboard
            </a>

            <a class="nav-link" href="search.html">
                Search
            </a>

            <a class="nav-link" href="external-api.html">
                Market API
            </a>

            <a class="nav-link" href="crypto-list.html">
                My Portfolio
            </a>

            <a
                class="nav-link"
                id="historyLink"
                href="history.html"
            >
                History
            </a>

            <div
                id="authButtons"
                class="d-flex align-items-center ms-3"
            ></div>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card p-4">

        <h1 class="page-title">
            Add Cryptocurrency
        </h1>

        <form
            onsubmit="event.preventDefault(); addCrypto();"
        >

            <div class="mb-3">

                <label class="form-label">
                    Cryptocurrency Name
                </label>

                <input
                    type="text"
                    id="cryptoName"
                    class="form-control"
                    placeholder="Example: Bitcoin"
                    required
                    minlength="2"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Symbol
                </label>

                <input
                    type="text"
                    id="cryptoSymbol"
                    class="form-control"
                    placeholder="Example: BTC"
                    required
                    minlength="2"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Current Price
                </label>

                <input
                    type="number"
                    id="cryptoPrice"
                    class="form-control"
                    placeholder="Example: 65000"
                    required
                    min="0.01"
                    step="0.01"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    id="cryptoDescription"
                    class="form-control"
                    rows="5"
                    placeholder="Enter cryptocurrency description"
                    required
                    minlength="5"
                ></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >
                Add Cryptocurrency
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
