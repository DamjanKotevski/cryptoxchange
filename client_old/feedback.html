<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>User Feedback</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body onload="displayRole(); updateNavbar(); hideHistoryForNonAdmin(); loadFeedback();">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="dashboard.html">
            CryptoXchange
        </a>

        <div class="navbar-nav ms-auto align-items-center">

            <div id="roleBox" class="me-3"></div>

            <a class="nav-link" href="dashboard.html">
                Dashboard
            </a>

            <a class="nav-link" href="search.html">
                Search
            </a>

            <a class="nav-link" href="external-api.html">
                Market API
            </a>

            <a class="nav-link" href="crypto-list.html">
                My Portfolio
            </a>

            <a
                class="nav-link"
                id="historyLink"
                href="history.html"
            >
                History
            </a>

            <div
                id="authButtons"
                class="d-flex align-items-center ms-3"
            ></div>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="page-title">
        User Feedback
    </h1>

    <div class="card p-4 mb-4">

        <form
            onsubmit="event.preventDefault(); submitFeedback();"
        >

            <div class="mb-3">

                <label>
                    Your Feedback
                </label>

                <textarea
                    id="feedbackMessage"
                    class="form-control"
                    rows="5"
                    placeholder="Write your feedback..."
                    required
                    minlength="3"
                ></textarea>

            </div>

            <div class="mb-3">

                <label>
                    Rating
                </label>

                <select
                    id="feedbackRating"
                    class="form-select"
                    required
                >

                    <option value="5">
                        5 - Excellent
                    </option>

                    <option value="4">
                        4 - Very Good
                    </option>

                    <option value="3">
                        3 - Good
                    </option>

                    <option value="2">
                        2 - Fair
                    </option>

                    <option value="1">
                        1 - Poor
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-success"
            >
                Submit Feedback
            </button>

        </form>

    </div>

    <div id="feedbackMessageBox"></div>

    <div class="card p-4">

        <h4>User Comments</h4>

        <div id="feedbackList"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
